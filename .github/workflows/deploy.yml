name: Deploy Docsify to GitHub Pages

on:
  push:
    branches:
      - main  # ou "master"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Pega o código do repositório
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Faz o deploy da pasta do Docsify para a branch gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs